<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy Knows!</title>
    <link rel="stylesheet" href="exercicio.css">
</head>
<body>
    <header>
    <h1>Andy<strong class="titulo"> Knows!</strong></h1>
    </header>
    <main>
        <section class="main__coisas">
            <section class="texto__botoes">
                <h2>Andy, sua agenda virtual</h2>
                <p>Utilize aqui para ficar por dentro e <strong class="atualizado">ATUALIZADO.</strong> Faça planilhas, relatórios, meetings, e muito mais! Com a Andy, você nao se perde!</p>
                <button class="botao__inicio"><img src="icon.png" alt=""> <span>Iniciar Agenda</span></button>
                <button class="botao__ajuda"><span>Ajuda</span></button>
            </section>
            <section class="quadradinhos">
                <img class="qudrados" src="imagem.svg.png" alt="">
                <img class="qudrados" src="imagem2.svg.png" alt="">
                <img class="qudrados" src="imagem3.svg.png" alt="">
                <img class="qudrados" src="imagem4.svg.png" alt="">
            </section>
        </section>

        <section class="agedona__juntos">
            <img class="agenda_titulo" src="Title-bar.png" alt="calendario_ios">
            <img class="agenda" src="Image.png" alt="calendario_ios">
        </section>
    </main>


</body>
</html>
